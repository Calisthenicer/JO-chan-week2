<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 CALI-ROUTINE | 과학적 맨몸운동 설계</title>
    
    <!-- 구글 애드센스 설정 -->
    <meta name="google-adsense-account" content="ca-pub-5784800605906401">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5784800605906401" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 테마 전환</button>

<nav class="navbar">
    <button class="nav-btn active" onclick="showPage('setup-page')">🎯 루틴 설정</button>
    <button class="nav-btn" onclick="showPage('assessment-page')" id="nav-assessment" disabled>📝 수준 진단</button>
    <button class="nav-btn" onclick="showPage('workout-page')" id="nav-workout" disabled>🏋️ 오늘의 운동</button>
    <button class="nav-btn" onclick="showPage('guide-page')">🥗 영양 전략</button>
    <button class="nav-btn" onclick="showPage('privacy-page')">⚖️ 정책 안내</button>
</nav>

<div class="container">
    <!-- 1페이지: 루틴 기본 설정 -->
    <div id="setup-page" class="page active">
        <h1>🏋️ CALI-ROUTINE</h1>
        <p class="intro-text">당신의 목표에 맞는 맨몸운동 루틴을 설계합니다.</p>
        
        <div class="setup-container">
            <div class="setup-group">
                <h3>1. 오늘 집중할 부위</h3>
                <div class="selection-grid" id="part-selection">
                    <button class="select-item" data-value="arms">팔 (이두/삼두)</button>
                    <button class="select-item" data-value="back">등</button>
                    <button class="select-item" data-value="chest">가슴</button>
                    <button class="select-item" data-value="upper">상체 전체</button>
                    <button class="select-item" data-value="lower">하체</button>
                    <button class="select-item" data-value="push">밀기 위주</button>
                    <button class="select-item" data-value="pull">당기기 위주</button>
                </div>
            </div>

            <div class="setup-group">
                <h3>2. 운동 목적</h3>
                <div class="selection-grid" id="goal-selection">
                    <button class="select-item" data-value="strength">스트렝스</button>
                    <button class="select-item" data-value="hypertrophy">근비대</button>
                    <button class="select-item" data-value="endurance">근지구력</button>
                </div>
            </div>

            <div class="setup-group">
                <h3>3. 신체 정보</h3>
                <div class="input-group">
                    <label for="user-weight">현재 체중 (kg):</label>
                    <input type="number" id="user-weight" placeholder="ex) 75" min="30" max="200">
                </div>
            </div>

            <button class="main-btn" onclick="startAssessment()">다음 단계로 (수준 진단) ➔</button>
        </div>
    </div>

    <!-- 2페이지: 수준 진단 체크리스트 -->
    <div id="assessment-page" class="page">
        <h2>📝 현재 수행 능력 진단</h2>
        <p class="intro-text">정확한 레벨 측정을 위해 현재 가능한 최대 개수를 선택해주세요.</p>
        <div class="setup-container assessment-box">
            <div class="assessment-item">
                <label>정석 푸쉬업은 몇 개 가능한가요?</label>
                <select id="eval-push">
                    <option value="0">1개 미만 (무릎 대고 가능)</option>
                    <option value="1">1~10개</option>
                    <option value="2">11~25개</option>
                    <option value="3">25개 이상</option>
                </select>
            </div>
            <div class="assessment-item">
                <label>정석 풀업(턱걸이)은 몇 개 가능한가요?</label>
                <select id="eval-pull">
                    <option value="0">매달리기만 가능</option>
                    <option value="1">1~3개 (네거티브 포함)</option>
                    <option value="2">4~10개</option>
                    <option value="3">10개 이상</option>
                </select>
            </div>
            <div class="assessment-item">
                <label>정석 스쿼트는 몇 개 가능한가요?</label>
                <select id="eval-squat">
                    <option value="0">10개 미만</option>
                    <option value="1">10~25개</option>
                    <option value="2">26~50개</option>
                    <option value="3">50개 이상</option>
                </select>
            </div>
            <button class="main-btn" onclick="completeSetup()">진단 완료 및 루틴 확인 🔥</button>
        </div>
    </div>

    <!-- 3페이지: 운동 루틴 -->
    <div id="workout-page" class="page">
        <div id="workout-result"></div>
    </div>

    <!-- 4페이지: 영양 전략 -->
    <div id="guide-page" class="page">
        <h2>🥗 맞춤 식단 가이드</h2>
        <div id="guide-content" class="guide-container"></div>
    </div>

    <!-- 5페이지: 정책 안내 -->
    <div id="privacy-page" class="page">
        <h2>⚖️ 법적 고지 및 정책</h2>
        <div class="policy-content">
            <p>본 서비스는 사용자의 안전을 최우선으로 합니다. 자세가 흐트러지면 즉시 중단하십시오.</p>
        </div>
    </div>
</div>

<footer class="site-footer">
    <p>&copy; 2026 CALI-ROUTINE. Beyond Your Limit.</p>
</footer>

<script src="main.js"></script>
</body>
</html>
